name: Build MkDocs site
description: pnpm + uv で依存関係を導入し、PDF を含む MkDocs サイトを `site/` に出力する。

runs:
  using: composite
  steps:
    - name: pnpm をセットアップ
      uses: pnpm/action-setup@v4

    - name: Node.js をセットアップ
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: pnpm

    - name: uv をセットアップ
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Python をセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: WeasyPrint 用のシステムライブラリーを導入
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0 libcairo2

    - name: 依存パッケージを導入
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Playwright Chromium を導入
      shell: bash
      run: uv run playwright install --with-deps chromium

    - name: MkDocs サイトをビルド
      shell: bash
      env:
        RENDER_SVG: '1'
        RENDER_PNG: '1'
        ENABLE_PDF: '1'
      run: uv run mkdocs build --site-dir site
